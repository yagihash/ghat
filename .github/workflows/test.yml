name: "Go test"

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26'

      - name: go test
        run: |
          go test -v -cover -race ./...

      - name: go build
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -trimpath -o /dev/null ./cmd/ghat
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -trimpath -o /dev/null ./cmd/post
